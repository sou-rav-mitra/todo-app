<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDo App</title>
    <link rel="stylesheet" href="indexstyle.css" />
    <script src="script.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Fjalla+One&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Smooch+Sans:wght@100..900&family=Space+Grotesk:wght@300..700&family=Syne:wght@400..800&family=Titillium+Web:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="main">
      <div class="container">
        <h1>Enter your name</h1>
        <p class="subtitle" id="greeting">
          <i id="greetingIcon"></i>
          <span id="greetingText">Let's get your tasks organized.</span>
        </p>
        <input
          type="text"
          class="username"
          id="username"
          placeholder="your name"
          autocomplete="name"
        />
        <p class="error-msg" id="errorMsg">Please enter your name.</p>
        <button id="submitBtn">Continue</button>

        <script>
          const greetingText = document.getElementById("greetingText");
          const greetingIcon = document.getElementById("greetingIcon");
          const hour = new Date().getHours();

          let greeting = "";
          let iconClass = "";

          if (hour >= 5 && hour < 12) {
            greeting = "Good morning! Let's get things done.";
            iconClass = "fa-solid fa-sun";
          } else if (hour >= 12 && hour < 17) {
            greeting = "Good afternoon! Stay productive.";
            iconClass = "fa-solid fa-cloud-sun";
          } else if (hour >= 17 && hour < 21) {
            greeting = "Good evening! Plan your night.";
            iconClass = "fa-solid fa-cloud-moon";
          } else {
            greeting = "Burning the midnight oil? Let's go.";
            iconClass = "fa-solid fa-moon";
          }

          greetingText.textContent = greeting;
          greetingIcon.className = iconClass;
        </script>

        <script>
          const submitBtn = document.getElementById("submitBtn");
          const usernameInput = document.getElementById("username");
          const errorMsg = document.getElementById("errorMsg");

          submitBtn.addEventListener("click", function () {
            const name = usernameInput.value.trim();

            if (name !== "") {
              localStorage.setItem("username", name);
              window.location.href = "todo.html";
            } else {
              errorMsg.classList.add("visible"); // show error
            }
          });

          // Hide error once user starts typing again
          usernameInput.addEventListener("input", function () {
            errorMsg.classList.remove("visible");
          });
        </script>
      </div>
    </div>
  </body>
</html>
