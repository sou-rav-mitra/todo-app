<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDo App</title>
    <link rel="stylesheet" href="style.css" />
    <script src="todoscript.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Fjalla+One&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Smooch+Sans:wght@100..900&family=Space+Grotesk:wght@300..700&family=Syne:wght@400..800&family=Titillium+Web:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="main">
      <div class="header">
        <h1 id="welcomeMsg"></h1>
        <button id="logoutBtn" title="Switch user">
          <i class="fa-solid fa-right-from-bracket"></i>
        </button>
      </div>

      <div class="input-area">
        <input type="text" id="taskInput" placeholder="Add a new task..." />
        <div class="select-wrapper">
          <select id="prioritySelect">
            <option value="low">🟢 Low</option>
            <option value="medium" selected>🟡 Medium</option>
            <option value="high">🔴 High</option>
          </select>
        </div>
        <button id="addBtn"><i class="fa-solid fa-plus"></i> Add</button>
      </div>

     
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>

     
      <p class="task-counter" id="taskCounter">0 tasks</p>

      
      <div class="task-list" id="taskList">
        <div class="empty-state" id="emptyState">
          <i class="fa-regular fa-clipboard"></i>
          <p>No tasks yet! Add one above.</p>
        </div>
      </div>

      <footer class="footer">
        <p>© 2026 Sourav. All rights reserved.</p>
        <p class="footer-sub">
          Built with <i class="fa-solid fa-heart"></i> using HTML, CSS & JS
        </p>
      </footer>
    </div>
  </body>
</html>
